app-id: org.schelstraete.boosteroid
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: boosteroid-launcher.sh

finish-args:
  # Network: download binary on first run + stream games
  - --share=network
  # IPC namespace: required for X11 shared memory (MIT-SHM)
  - --share=ipc
  # Display: support both X11 and Wayland
  - --socket=x11
  - --socket=wayland
  # Audio via PulseAudio / PipeWire compatibility layer
  - --socket=pulseaudio
  # Full device access: GPU (VA-API/VDPAU), gamepads, headsets (/dev/input/*)
  - --device=all
  # Steam shortcuts.vdf — native Steam install
  - --filesystem=~/.local/share/Steam:rw
  - --filesystem=~/.steam:rw
  # Steam shortcuts.vdf — Flatpak Steam install
  - --filesystem=~/.var/app/com.valvesoftware.Steam:rw
  # User icon theme — so Steam can load the shortcut icon outside the sandbox
  - --filesystem=~/.local/share/icons:create
  # flatpak-spawn --host: lets the portal intercept route OAuth URLs to Steam
  - --talk-name=org.freedesktop.Flatpak
  # Allow sandbox to own the portal name so our fake service intercepts Qt's
  # QDesktopServices::openUrl() calls before they reach the host portal
  - --own-name=org.freedesktop.portal.Desktop
  # Write logs to ~/logs/boosteroid.log (accessible from Desktop Mode)
  - --filesystem=~/logs:create
  # Clear LD_PRELOAD so Steam's preloads don't affect the Boosteroid binary
  - --env=LD_PRELOAD=

modules:
  - name: numactl
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/numactl/numactl/releases/download/v2.0.18/numactl-2.0.18.tar.gz
        sha256: b4fc0956317680579992d7815bc43d0538960dc73aa1dd8ca7e3806e30bc1274

  - name: python3-pygobject
    buildsystem: meson
    config-opts:
      - -Dpycairo=disabled
    sources:
      - type: archive
        url: https://download.gnome.org/sources/pygobject/3.50/pygobject-3.50.2.tar.gz
        sha256: ece6b860aab77cb649fdfc6e88d8a83765e7a62f7ffd39a628d6e2a0d397a7ff

  - name: boosteroid
    buildsystem: simple
    build-commands:
      - gcc src/force_fullscreen.c -lX11 -o /app/bin/boosteroid-fullscreen
      - install -Dm644 version.txt /app/share/boosteroid/version
      - install -Dm755 boosteroid-launcher.sh /app/bin/boosteroid-launcher.sh
      - install -Dm755 src/splash.py /app/lib/boosteroid/splash.py
      - install -Dm755 src/portal_openuri.py /app/lib/boosteroid/portal_openuri.py
      - install -Dm755 src/install_boosteroid.py /app/lib/boosteroid/install_boosteroid.py
      - install -Dm755 src/add-to-steam.py /app/lib/boosteroid/add-to-steam.py
      - install -Dm644 src/vdf.py /app/lib/boosteroid/vdf.py
      - install -Dm644 org.schelstraete.boosteroid.desktop /app/share/applications/org.schelstraete.boosteroid.desktop
      - install -Dm644 org.schelstraete.boosteroid.svg /app/share/icons/hicolor/scalable/apps/org.schelstraete.boosteroid.svg
      - install -Dm644 src/icon-256.png /app/share/boosteroid/icon-256.png
      - install -Dm644 org.schelstraete.boosteroid.metainfo.xml /app/share/metainfo/org.schelstraete.boosteroid.metainfo.xml
      - install -Dm644 src/steam-hero.png    /app/share/boosteroid/grid/hero.png
      - install -Dm644 src/steam-capsule.png /app/share/boosteroid/grid/capsule.png
      - install -Dm644 src/steam-wide.png    /app/share/boosteroid/grid/wide.png
      - install -Dm644 src/steam-logo.png    /app/share/boosteroid/grid/logo.png
      - install -Dm644 src/controller_config.vdf /app/share/boosteroid/controller_config.vdf
      - install -Dm644 src/controller_config_ps5.vdf /app/share/boosteroid/controller_config_ps5.vdf
    sources:
      - type: dir
        path: .
