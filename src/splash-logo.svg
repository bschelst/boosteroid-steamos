<svg width="968" height="478" viewBox="-24 -24 968 478" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080c18"/>
      <stop offset="1" stop-color="#120828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="920" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2096D9"/>
      <stop offset="1" stop-color="#5C35EE"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="200" cy="215" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2040a0" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#080c18" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="6" result="shifted"/>
      <feComponentTransfer result="dimmed">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="dimmed"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Rounded clip -->
    <clipPath id="rounded">
      <rect x="0" y="0" width="920" height="430" rx="18" ry="18"/>
    </clipPath>
  </defs>

  <!-- Card with shadow and rounded corners -->
  <g filter="url(#shadow)">
    <g clip-path="url(#rounded)">
      <!-- Background -->
      <rect width="920" height="430" fill="url(#bg)"/>
      <rect width="920" height="430" fill="url(#leftGlow)"/>

      <!-- Subtle grid lines -->
      <g stroke="#1a2a50" stroke-width="1" opacity="0.35">
        <line x1="0" y1="215" x2="920" y2="215"/>
        <line x1="460" y1="0" x2="460" y2="430"/>
      </g>

      <!-- Cloud icon -->
      <g transform="translate(28, 48) scale(1.32)" filter="url(#softglow)">
        <circle cx="88"  cy="136" r="40" fill="white" opacity="0.92"/>
        <circle cx="130" cy="112" r="48" fill="white" opacity="0.92"/>
        <circle cx="172" cy="136" r="34" fill="white" opacity="0.92"/>
        <rect x="50" y="136" width="154" height="44" rx="6" fill="white" opacity="0.92"/>
        <polygon points="104,136 104,174 154,155" fill="#1a4fa8"/>
      </g>

      <!-- Vertical accent bar -->
      <rect x="308" y="75" width="5" height="280" rx="2.5" fill="url(#accent)"/>

      <!-- BOOSTEROID -->
      <text x="325" y="210"
            font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
            font-size="84" font-weight="900"
            fill="white" letter-spacing="-2">BOOSTEROID</text>

      <!-- Gradient underline -->
      <rect x="325" y="228" width="560" height="4" rx="2" fill="url(#accent)" opacity="0.85"/>

      <!-- Tagline -->
      <text x="328" y="268"
            font-family="Arial, sans-serif" font-size="19" font-weight="400"
            fill="#7a9acc" letter-spacing="3">CLOUD GAMING  ·  STEAMOS  ·  BAZZITE</text>

      <!-- "UNOFFICIAL" pill -->
      <rect x="325" y="290" width="162" height="40" rx="20"
            fill="none" stroke="#5C35EE" stroke-width="1.8" opacity="0.75"/>
      <text x="406" y="316"
            font-family="Arial, sans-serif" font-size="16"
            fill="#9980e8" text-anchor="middle" letter-spacing="2">UNOFFICIAL</text>

      <!-- "SCHELSTRAETE.ORG" pill -->
      <rect x="500" y="290" width="252" height="40" rx="20"
            fill="none" stroke="#5C35EE" stroke-width="1.8" opacity="0.75"/>
      <text x="626" y="316"
            font-family="Arial, sans-serif" font-size="16"
            fill="#9980e8" text-anchor="middle" letter-spacing="2">SCHELSTRAETE.ORG</text>

      <!-- Bottom gradient bar -->
      <rect x="0" y="418" width="920" height="12" fill="url(#accent)" opacity="0.5"/>
    </g>

    <!-- Subtle border on top of clipped content -->
    <rect x="0.5" y="0.5" width="919" height="429" rx="18" ry="18"
          fill="none" stroke="rgba(27,159,255,0.25)" stroke-width="1"/>
  </g>
</svg>
