<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080c18"/>
      <stop offset="1" stop-color="#120828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2096D9"/>
      <stop offset="1" stop-color="#5C35EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="300" cy="370" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a50c0" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#080c18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomFade" x1="0" y1="600" x2="0" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080c18" stop-opacity="0"/>
      <stop offset="1" stop-color="#080c18"/>
    </linearGradient>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="600" height="6" fill="url(#accent)"/>

  <!-- Cloud icon — centered, large -->
  <g transform="translate(110, 180) scale(1.48)" filter="url(#softglow)">
    <circle cx="88"  cy="136" r="40" fill="white" opacity="0.93"/>
    <circle cx="130" cy="112" r="48" fill="white" opacity="0.93"/>
    <circle cx="172" cy="136" r="34" fill="white" opacity="0.93"/>
    <rect x="50" y="136" width="154" height="44" rx="6" fill="white" opacity="0.93"/>
    <polygon points="104,136 104,174 154,155" fill="#1a4fa8"/>
  </g>

  <!-- Bottom fade overlay -->
  <rect width="600" height="900" fill="url(#bottomFade)"/>

  <!-- Gradient underline above text -->
  <rect x="50" y="640" width="500" height="3" rx="1.5" fill="url(#accent)" opacity="0.7"/>

  <!-- BOOSTEROID -->
  <text x="300" y="720"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="68" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="-1">BOOSTEROID</text>

  <!-- Subtitle -->
  <text x="300" y="770"
        font-family="Arial, sans-serif" font-size="22"
        fill="#7a9acc" text-anchor="middle" letter-spacing="4">CLOUD GAMING</text>

  <!-- "UNOFFICIAL" pill -->
  <rect x="102" y="800" width="160" height="38" rx="19"
        fill="none" stroke="#5C35EE" stroke-width="1.5" opacity="0.7"/>
  <text x="182" y="824"
        font-family="Arial, sans-serif" font-size="15"
        fill="#9980e8" text-anchor="middle" letter-spacing="1.5">UNOFFICIAL</text>

  <!-- "SCHELSTRAETE.ORG" pill -->
  <rect x="274" y="800" width="224" height="38" rx="19"
        fill="none" stroke="#5C35EE" stroke-width="1.5" opacity="0.7"/>
  <text x="386" y="824"
        font-family="Arial, sans-serif" font-size="15"
        fill="#9980e8" text-anchor="middle" letter-spacing="1.5">SCHELSTRAETE.ORG</text>

  <!-- Bottom bar -->
  <rect x="0" y="888" width="600" height="12" fill="url(#accent)" opacity="0.5"/>
</svg>
