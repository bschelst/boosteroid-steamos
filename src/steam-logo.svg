<svg width="880" height="280" viewBox="0 0 880 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cloud icon — centred in canvas (cloud bbox: x=50..206, y=64..180, scaled 1.8x) -->
  <g transform="translate(210, -80) scale(1.8)" filter="url(#softglow)">
    <circle cx="88"  cy="136" r="40" fill="white"/>
    <circle cx="130" cy="112" r="48" fill="white"/>
    <circle cx="172" cy="136" r="34" fill="white"/>
    <rect x="50" y="136" width="154" height="44" rx="6" fill="white"/>
    <polygon points="104,136 104,174 154,155" fill="#1a4fa8"/>
  </g>
</svg>
